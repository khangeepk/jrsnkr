<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame - JR Snooker Lounge</title>
    <link rel="stylesheet" href="style.css">
    <script>if(!localStorage.getItem('currentUser')) window.location.href='login.html';</script>
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: var(--bg-main); color: var(--text-primary);">
    <div style="font-size: 5rem; margin-bottom: 2rem;">👑</div>
    <h1 style="font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(90deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Hall of Fame</h1>
    <p style="font-size: 1.25rem; color: var(--text-secondary); max-width: 600px; margin-bottom: 2rem;">We are currently calculating the rankings and compiling historical data for our top players. Check back soon for the ultimate leaderboard!</p>
    <button class="btn btn-start" style="width: auto; padding: 0.75rem 2rem;" onclick="location.href='/'">Back to Dashboard</button>
</body>
</html>
